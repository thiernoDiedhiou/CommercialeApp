server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # Headers de sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS — domaine autorisé configuré via CORS_ALLOWED_ORIGIN dans .env
    # Docker : envsubst remplace ${CORS_ALLOWED_ORIGIN} avant démarrage nginx
    # VPS    : exécuter envsubst manuellement (voir README) ou éditer ici directement
    add_header Access-Control-Allow-Origin "${CORS_ALLOWED_ORIGIN}" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-ID, Accept" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Réponse OPTIONS preflight (CORS)
    if ($request_method = OPTIONS) {
        return 204;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # PHP-FPM — pointe vers le service app sur le port 9000
    location ~ \.php$ {
        fastcgi_pass              app:9000;
        fastcgi_index             index.php;
        fastcgi_param             SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                   fastcgi_params;
        fastcgi_read_timeout      60;
        fastcgi_buffer_size       16k;
        fastcgi_buffers           4 16k;
    }

    # Interdit l'accès aux fichiers cachés (.env, .git…)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Logs
    access_log /var/log/nginx/saas_access.log;
    error_log  /var/log/nginx/saas_error.log warn;
}
