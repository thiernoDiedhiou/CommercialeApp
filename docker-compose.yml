services:

  # ── Application Laravel (PHP 8.3-FPM) ────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas-app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      # En développement, monter le code source pour le rechargement à chaud
      - ./backend:/var/www/html
      # Le vendor reste dans le container (ne pas monter par-dessus)
      - /var/www/html/vendor
    networks:
      - saas-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: saas-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      # Valeur par défaut : frontend Vite local — remplacer en production
      CORS_ALLOWED_ORIGIN: "${CORS_ALLOWED_ORIGIN:-http://localhost:5173}"
    volumes:
      - ./backend:/var/www/html:ro
      # Monté comme template : l'image nginx:alpine exécute envsubst automatiquement
      # sur les fichiers dans /etc/nginx/templates/ → génère /etc/nginx/conf.d/default.conf
      - ./nginx/default.conf:/etc/nginx/templates/default.conf.template:ro
    networks:
      - saas-network
    depends_on:
      - app

  # ── MySQL 8.0 ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: saas-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-saas_commercial}
      MYSQL_USER: ${DB_USERNAME:-saas}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - saas-network
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: saas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - saas-network
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"

  # ── Laravel Horizon (Phase 2 — décommenter quand QUEUE_CONNECTION=redis) ──────
  # horizon:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: saas-horizon
  #   restart: unless-stopped
  #   env_file:
  #     - ./backend/.env
  #   command: php artisan horizon
  #   volumes:
  #     - ./backend:/var/www/html
  #     - /var/www/html/vendor
  #   networks:
  #     - saas-network
  #   depends_on:
  #     - mysql
  #     - redis

# ── Volumes persistants ───────────────────────────────────────────────────────
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

# ── Réseau interne ────────────────────────────────────────────────────────────
networks:
  saas-network:
    driver: bridge
